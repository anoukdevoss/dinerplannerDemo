<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title>th:text="${guest.getFullName()}">Gastdetail</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container">

    <h1 th:text="${guest.getFullName()}">Naam</h1>

    <a th:href="@{/guests/edit/{id}(id=${guest.id})}">Bewerken</a>
    <form th:action="@{/guests/delete/{id}(id=${guest.id})}" method="post">
        <button type="submit">Verwijderen</button>
    </form>

    <a href="/guests">Terug naar overzicht</a>

</div>

<footer th:replace="~{fragments/general :: footer}"></footer>

<div th:replace="~{fragments/general :: scripts}"></div>
</body>
</html>
