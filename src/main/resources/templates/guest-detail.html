<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title>Gastdetail</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<div class="container py-4">

    <h1 class="mb-4" th:text="${guest.fullName}">Naam</h1>

    <div class="card p-4 shadow-sm mb-4">
        <p class="mb-2">
            <strong>Voornaam:</strong>
            <span th:text="${guest.firstName}">Voornaam</span>
        </p>

        <p class="mb-2">
            <strong>Achternaam:</strong>
            <span th:text="${guest.lastName}">Achternaam</span>
        </p>
    </div>

    <div class="d-flex gap-2">
        <a th:href="@{/guests/edit/{id}(id=${guest.id})}" class="btn btn-warning">
            Bewerken
        </a>

        <form th:action="@{/guests/delete/{id}(id=${guest.id})}" method="post">
            <button type="submit" class="btn btn-danger">
                Verwijderen
            </button>
        </form>

        <a th:href="@{/guests}" class="btn btn-outline-secondary">
            Terug naar overzicht
        </a>
    </div>

</div>

<footer th:replace="~{fragments/general :: footer}"></footer>
<div th:replace="~{fragments/general :: scripts}"></div>
</body>
</html>
