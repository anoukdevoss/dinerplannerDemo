<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="baseheader(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Dinerplanner</title>

    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.css}">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-cup-hot-fill"></i>
            Dinerplanner
        </a>

        <div class="navbar-nav ms-auto">
            <a th:href="@{/}" class="nav-link"
               th:classappend="${activePage == 'home'} ? ' active' : ''">
                <i class="bi bi-house-door-fill"></i> Home
            </a>

            <a th:href="@{/diners}" class="nav-link"
               th:classappend="${activePage == 'diners'} ? ' active' : ''">
                <i class="bi bi-calendar-event-fill"></i> Diners
            </a>

            <a th:href="@{/guests}" class="nav-link"
               th:classappend="${activePage == 'guests'} ? ' active' : ''">
                <i class="bi bi-people-fill"></i> Gasten
            </a>

            <a th:href="@{/user/all}" class="nav-link"
               th:classappend="${activePage == 'users'} ? ' active' : ''"
            sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-people-fill"></i> Gebruikersbeheer
            </a>

            <div class="flex-fill d-flex justify-content-end align-items-center">
                <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                    <button class="btn btn-outline-light btn-sm" type="submit">Uitloggen</button>
                </form>
                <a th:href="@{/login}" sec:authorize="isAnonymous()">
                    <button class="btn btn-outline-light btn-sm" type="submit">Inloggen</button></a>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-light border-top mt-5 py-3">
    <div class="container text-center text-muted">
        <small>&copy; 2026 DinerplannerDemo</small>
    </div>
</footer>

<div th:fragment="scripts">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</div>

</body>
</html>
