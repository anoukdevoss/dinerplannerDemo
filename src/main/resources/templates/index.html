<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: baseheader(~{:: title})}">
    <title>Dinerplanner beginpagina</title>
</head>
<body>
<nav th:replace="~{fragments/general :: navbar}"></nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5 text-center">

                    <h1 class="display-5 fw-bold mb-3" th:text="'Welkom, ' + ${name} + '!'">
                        Welkom
                    </h1>

                    <p class="lead text-muted mb-4">
                        Fijn dat je er bent in jouw Dinerplanner.
                    </p>

                    <div class="bg-light rounded-3 p-3 mb-4">
                        <p class="mb-0 fs-5">
                            Vandaag is:
                            <span class="fw-semibold" th:text="${date}">Datum</span>
                        </p>
                    </div>

                    <a th:href="@{/diners}" class="btn btn-primary btn-lg px-4">
                        Ga naar alle diners
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/general :: footer}"></footer>

<div th:replace="~{fragments/general :: scripts}"></div>
</body>
</html>
