<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: head('Overzicht diners')}"></head>
<body>

<nav th:replace="~{fragments/general :: navbar}"></nav>

<main class="container">
    <h1 class="mb-4">Overzicht diners</h1>

    <form method="get" th:action="@{/diners}" class="row g-2 mb-4">
        <div class="col-auto">
                <input type="text"
                       name="query"
                       th:value="${query}"
                       placeholder="Zoek op titel..."
                       class="form-control"/>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Zoeken</button>
        </div>
    </form>

    <div class="row row-cols-2 row-cols-lg-4 g-2 g-lg-3">
        <div th:each="diner : ${diners}">
             <div class="card" style="width: 18rem;">
                 <img class="card-img-top"
                      th:if="${diner.imagePath != null}"
                      th:src="@{/images/{file}(file=${diner.imagePath})}"
                      alt="Afbeelding"
                      width="200"
                      style="height: 200px; object-fit: cover;">
                 <div class="card-body">
                     <h5 class="card-title" th:text="${diner.title}">Card title</h5>
                     <span th:text="${diner.date}">Datum</span><br>
                     <span th:text="${diner.location}">Locatie</span><br>
                     <span th:text="${diner.thema}">Thema</span><br>
                     <span class="card-text"
                           th:text="${diner.description}" >Some quick example text to build on the card title and make up the bulk of the card’s content.</span>

                    <a th:href="@{/diners/{dinerId}(dinerId=${diner.id})}"
                       class="btn btn-sm btn-outline-primary">
                        Bekijk
                    </a>

                    <a th:href="@{/diners/edit/{dinerId}(dinerId=${diner.id})}"
                       class="btn btn-sm btn-outline-warning">
                        Bewerken
                    </a>

                    <form th:action="@{/diners/delete/{dinerId}(dinerId=${diner.id})}"
                          method="post"
                          style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger">
                            Verwijderen
                        </button>
                    </form>

                    <form th:action="@{/menus/add/{dinerId}(dinerId=${diner.id})}"
                          method="post"
                          style="display:inline;">
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/diners/save}" class="btn btn-primary">Nieuw diner toevoegen</a>
        <a th:href="@{/guests}" class="btn btn-secondary">Nieuwe gast toevoegen</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success mt-3">
        <span th:text="${successMessage}">Diner opgeslagen!</span>
    </div>
</main>

<footer th:replace="~{fragments/general :: footer}"></footer>
<div th:replace="~{fragments/general :: scripts}"></div>

</body>
</html>
